name: Clean Survey Data

on:
  workflow_dispatch:
  push:
    branches: ["main", "work"]
    paths:
      - "scripts/clean_data.py"
      - "data/raw/**"
      - ".github/workflows/clean-data.yml"

jobs:
  clean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run cleaning pipeline
        run: python scripts/clean_data.py

      - name: Upload derived artifacts
        uses: actions/upload-artifact@v4
        with:
          name: derived-data
          path: data/derived/
